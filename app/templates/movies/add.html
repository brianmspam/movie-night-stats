{% extends "base.html" %}
{% block title %}Add Movie{% endblock %}

{% block content %}
<h2>Add Movie</h2>

<form method="post">
    <label>TMDb URL</label>
    <input type="text" name="tmdb_url" value="{{ tmdb_url or '' }}">
    <button type="submit" name="fetch_tmdb" value="1">Fetch from TMDb</button>

    <label>Title</label>
    <input type="text" name="title" value="{{ title or '' }}">

    <label>Year</label>
    <input type="text" name="year" value="{{ year or '' }}">

    <label>Genre</label>
    <input type="text" name="genre" value="{{ genre or '' }}">

    <button type="submit" name="save" value="1">Save</button>
</form>
{% endblock %}
