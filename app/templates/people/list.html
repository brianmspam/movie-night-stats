{% extends "base.html" %}
{% block title %}Family{% endblock %}
{% block content %}
<h2>Family Members</h2>
<form method="POST" action="{{ url_for('people.add_person') }}" class="mb-4" style="max-width: 400px;">
    <div class="input-group">
        <input type="text" name="name" class="form-control" placeholder="Add family member..." required>
        <button class="btn btn-primary" type="submit">Add</button>
    </div>
</form>
{% if people %}
<ul class="list-group" style="max-width: 400px;">
    {% for person in people %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ person.name }}
        <span class="badge bg-secondary">{{ person.ratings | length }} ratings</span>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="text-muted">No family members yet.</p>
{% endif %}
{% endblock %}
